name: Release

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Release readiness
        run: python scripts/release_check.py --skip-package

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Installed package smoke test
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          python -m pip install dist/*.whl
          switchyard --version
          smoke_project="$(mktemp -d)"
          cat > "$smoke_project/switchyard.toml" <<'EOF'
          [project]
          name = "release-smoke"

          [services.web]
          command = "python -m http.server {port}"
          EOF
          (cd "$smoke_project" && switchyard doctor --json | grep release-smoke)
          switchyard skill show | grep switchyard_brief
          skill_target="$(mktemp -d)"
          switchyard skill install --target "$skill_target"
          test -f "$skill_target/switchyard/SKILL.md"

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    if: inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/switchyard-dev
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: inputs.publish_target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/switchyard-dev
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
