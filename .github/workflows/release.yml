name: Release

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      testpypi_smoke_confirmed:
        description: "Required for pypi: this version installed and smoked from TestPyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions checkout v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions setup-python v5
        with:
          python-version: "3.13"

      - name: Validate release tag
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          namespace = {}
          exec(Path("src/switchyard/__init__.py").read_text(), namespace)
          version = namespace["__version__"]
          ref_type = os.environ.get("GITHUB_REF_TYPE")
          ref_name = os.environ.get("GITHUB_REF_NAME")
          expected_tag = f"v{version}"
          if ref_type != "tag" or ref_name != expected_tag:
              raise SystemExit(f"Release must run from tag {expected_tag}; got {ref_type}:{ref_name}")
          changelog = Path("CHANGELOG.md").read_text()
          if f"## {version} - Unreleased" in changelog or f"## {version} - " not in changelog:
              raise SystemExit(f"CHANGELOG.md must finalize {version} before publishing")
          PY

      - name: Validate PyPI promotion gate
        if: inputs.publish_target == 'pypi'
        run: |
          if [ "${{ inputs.testpypi_smoke_confirmed }}" != "true" ]; then
            echo "Run the TestPyPI target first, verify its install smoke, then rerun with testpypi_smoke_confirmed checked." >&2
            exit 1
          fi

      - name: Release readiness
        run: python scripts/release_check.py

      - name: Build distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Installed package smoke test
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          python -m pip install dist/*.whl
          switchyard --version
          smoke_root="$(mktemp -d)"
          smoke_project="$smoke_root/project"
          mkdir -p "$smoke_project"
          export SWITCHYARD_HOME="$smoke_root/switchyard-home"
          export CODEX_HOME="$smoke_root/codex-home"
          cat > "$smoke_project/switchyard.toml" <<'EOF'
          [project]
          name = "release-smoke"

          [services.web]
          command = "python -m http.server {port}"
          EOF
          (cd "$smoke_project" && switchyard doctor --json | grep release-smoke)
          (cd "$smoke_project" && switchyard mcp config | grep -F 'args = ["mcp", "--project", "switchyard"]')
          (cd "$smoke_project" && switchyard mcp config --json > "$smoke_project/mcp-config.json")
          SMOKE_PROJECT="$smoke_project" python - <<'PY'
          import json
          import os
          from pathlib import Path

          smoke_project = Path(os.environ["SMOKE_PROJECT"]).resolve()
          text = (smoke_project / "mcp-config.json").read_text()
          data = json.loads(text)
          assert data["ok"] is True
          assert data["registered"] is True
          assert data["args"][-2:] == ["--project", "switchyard"]
          assert data["env"]["SWITCHYARD_HOME"] == str(Path(os.environ["SWITCHYARD_HOME"]).resolve())
          assert "[mcp_servers.switchyard.env]" in data["config_text"]
          assert "cwd =" not in data["config_text"]
          assert str(smoke_project) not in data["config_text"]
          PY
          (cd "$smoke_project" && switchyard mcp projects --json | grep '"name": "switchyard"')
          (cd "$smoke_project" && switchyard mcp projects --json | grep '"status": "ok"')
          ! (cd "$smoke_project" && switchyard mcp config | grep -F "cwd =")
          (cd "$smoke_project" && switchyard mcp install --dry-run | grep -F "# Would update:")
          (cd "$smoke_project" && switchyard mcp install --dry-run --json > "$smoke_project/mcp-install-dry-run.json")
          SMOKE_PROJECT="$smoke_project" python - <<'PY'
          import json
          import os
          from pathlib import Path

          smoke_project = Path(os.environ["SMOKE_PROJECT"]).resolve()
          text = (smoke_project / "mcp-install-dry-run.json").read_text()
          data = json.loads(text)
          assert data["ok"] is True
          assert data["dry_run"] is True
          assert data["registered"] is False
          assert data["args"][-2:] == ["--project", "switchyard"]
          assert data["env"]["SWITCHYARD_HOME"] == str(Path(os.environ["SWITCHYARD_HOME"]).resolve())
          assert "[mcp_servers.switchyard.env]" in data["config_text"]
          assert "cwd =" not in data["config_text"]
          assert str(smoke_project) not in data["config_text"]
          PY
          (cd "$smoke_project" && switchyard mcp install --json > "$smoke_project/mcp-install.json")
          SMOKE_PROJECT="$smoke_project" CODEX_HOME="$CODEX_HOME" python - <<'PY'
          import json
          import os
          from pathlib import Path

          smoke_project = Path(os.environ["SMOKE_PROJECT"]).resolve()
          codex_config = Path(os.environ["CODEX_HOME"], "config.toml")
          text = (smoke_project / "mcp-install.json").read_text()
          data = json.loads(text)
          config_text = codex_config.read_text()
          assert data["ok"] is True
          assert data["dry_run"] is False
          assert data["registered"] is True
          assert data["args"][-2:] == ["--project", "switchyard"]
          assert data["codex_config_path"] == str(codex_config)
          assert data["env"]["SWITCHYARD_HOME"] == str(Path(os.environ["SWITCHYARD_HOME"]).resolve())
          assert "[mcp_servers.switchyard.env]" in data["config_text"]
          assert "[mcp_servers.switchyard.env]" in config_text
          assert "cwd =" not in data["config_text"]
          assert "cwd =" not in config_text
          assert str(smoke_project) not in data["config_text"]
          assert str(smoke_project) not in config_text
          PY
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"resources/read","params":{"uri":"switchyard://project/brief"}}' \
            '{"jsonrpc":"2.0","id":2,"method":"prompts/get","params":{"name":"switchyard_branch_runtime","arguments":{"branch":"feature/release","services":"web"}}}' \
            | (cd "$smoke_project" && switchyard mcp --project switchyard) > "$smoke_project/mcp-smoke.jsonl"
          grep -F 'switchyard://project/brief' "$smoke_project/mcp-smoke.jsonl"
          grep -F 'feature/release' "$smoke_project/mcp-smoke.jsonl"
          switchyard skill show | grep switchyard_brief
          skill_target="$(mktemp -d)"
          switchyard skill install --target "$skill_target"
          test -f "$skill_target/switchyard/SKILL.md"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions upload-artifact v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    if: inputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/switchyard-dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions download-artifact v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pypa publish release v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: TestPyPI install smoke
        run: |
          version="${GITHUB_REF_NAME#v}"
          python -m venv .testpypi-smoke
          . .testpypi-smoke/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if python -m pip install --no-cache-dir \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "switchyard-dev==$version"; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              exit 1
            fi
            sleep 15
          done
          switchyard --version
          switchyard mcp --help | grep -F "Run without a subcommand to start the stdio MCP server"
          switchyard mcp --help | grep -F "[config|install|projects]"
          switchyard mcp --help | grep -F "commands:"
          ! switchyard mcp --help | grep -F "positional arguments:"
          ! switchyard mcp --help | grep -F -- "--cwd"
          switchyard mcp config --help | grep -F "usage: switchyard mcp config"
          ! switchyard mcp config --help | grep -F "[config|install|projects]"
          ! switchyard mcp config --help | grep -F -- "--cwd"
          switchyard mcp install --help | grep -F "usage: switchyard mcp install"
          ! switchyard mcp install --help | grep -F "[config|install|projects]"
          ! switchyard mcp install --help | grep -F -- "--cwd"

  publish-pypi:
    if: inputs.publish_target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/switchyard-dev
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions download-artifact v4
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # pypa publish release v1
