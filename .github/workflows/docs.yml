name: Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions checkout v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions setup-python v5
        with:
          python-version: "3.13"

      - name: Install docs dependencies
        run: python -m pip install mkdocs==1.6.1

      - name: Build docs
        run: mkdocs build --strict

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # actions configure-pages v5

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # actions upload-pages-artifact v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # actions deploy-pages v4
