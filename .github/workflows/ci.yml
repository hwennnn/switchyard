name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions checkout v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions setup-python v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile
        run: python -m compileall src

      - name: Unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: End-to-end smoke test
        run: python scripts/e2e_smoke.py

      - name: Release readiness
        run: python scripts/release_check.py --skip-package
