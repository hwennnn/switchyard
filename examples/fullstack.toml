[project]
name = "fullstack-demo"
worktree_root = ".worktrees/switchyard"

[env]
link = [".env.local", "apps/web/.env.local"]
copy = []

[proxy]
host = "127.0.0.1"
port = 7331
tld = "localhost"

[ports]
start = 41000
end = 49999

[services.postgres]
command = "scripts/dev-postgres {port}"
port = 5432

[services.redis]
command = "scripts/dev-redis {port}"
port = 6379

[services.api]
command = "scripts/dev-api {port} {postgres_port} {redis_port}"
port = 8000

[services.web]
command = "scripts/dev-web {port} {api_url}"
port = 3000

[profiles.isolated]
services = ["postgres", "redis", "api", "web"]

[profiles.shared]
services = ["api", "web"]
[profiles.shared.env]
POSTGRES_PORT = "5432"
REDIS_PORT = "6379"
